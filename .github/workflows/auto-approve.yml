# Automatically approve PRs made by Dependabot

name: Auto Approve Dependabot PR's

on:
  pull_request_target

permissions:
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
    - uses: hmarr/auto-approve-action@v4.0.0
      with:
        github-token: "${{ secrets.GITHUB_TOKEN }}"
